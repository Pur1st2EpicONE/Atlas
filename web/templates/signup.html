<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Atlas</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container auth-page">
        <div class="auth-header">
            <h1>Atlas</h1>
            <span class="note">Item Service</span>
            <h2>Sign Up</h2>
        </div>
        <form id="signup-form" class="form">
            <label>Login <input type="text" name="login" required></label>
            <label>Password <input type="password" name="password" required></label>
            <label>Role 
                <select name="role" required>
                    <option value="viewer">Viewer (view only)</option>
                    <option value="manager">Manager (view + edit)</option>
                    <option value="admin">Admin (full access)</option>
                </select>
            </label>
            <button type="submit">Sign Up</button>
        </form>
        <a href="/login" class="auth-link">Already have an account? Sign In</a>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
