<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">

        <header class="app-header">
            <div class="logo">
                <h1>Atlas</h1>
                <span class="note">Item Service</span>
            </div>
            <div class="nav-links">
                <a href="/login" id="login-link">Sign In</a>
                <a href="/signup" id="signup-link">Sign Up</a>
                <button id="signout-btn" style="display: none;">Sign Out</button>
            </div>
        </header>

        <div id="dashboard" style="display: none;">
            <div class="user-info">
                Logged in as: <strong id="current-role"></strong> 
                (ID: <span id="current-user-id"></span>)
            </div>

            <button id="add-item-btn" class="btn-primary" style="display: none;">+ Add Item</button>

            <div id="admin-history-search" style="display: none; margin: 20px 0 16px;">
                <div class="search-row">
                    <label>View History by Item ID:</label>
                    <input type="number" id="search-item-id" placeholder="e.g. 123" min="1">
                    <button onclick="viewHistoryById()" class="btn-primary">Open History</button>
                </div>
            </div>

            <table id="items-table" class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Updated</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="items-tbody"></tbody>
            </table>
        </div>

        <div id="item-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal('item-modal')">&times;</span>
                <h3 id="modal-title">Add Item</h3>
                <form id="item-form" class="form">
                    <input type="hidden" id="edit-item-id">
                    <label>Title <input id="item-name" type="text" required></label>
                    <label>Description <input id="item-description" type="text"></label>
                    <label>Quantity <input id="item-quantity" type="number" min="0" required></label>
                    <label>Price <input id="item-price" type="number" step="0.01" min="0" required></label>
                    <button type="submit" id="save-btn">Save</button>
                </form>
            </div>
        </div>

        <div id="history-modal" class="modal">
            <div class="modal-content history-modal">
                <span class="close" onclick="closeModal('history-modal')">&times;</span>
                <h3>History <span id="history-item-title"></span></h3>
                
                <div class="filters">
                    <label>From <input type="datetime-local" id="h-from"></label>
                    <label>To <input type="datetime-local" id="h-to"></label>
                    <label>User ID <input type="number" id="h-user" placeholder="ID"></label>
                    <label>Action
                        <select id="h-action">
                            <option value="">All</option>
                            <option value="INSERT">INSERT</option>
                            <option value="UPDATE">UPDATE</option>
                            <option value="DELETE">DELETE</option>
                        </select>
                    </label>
                    <label>Limit <input type="number" id="h-limit" value="50" min="1" max="2000"></label>
                </div>
                
                <div class="modal-actions">
                    <button onclick="loadHistory()" class="btn-primary">Filter</button>
                    <button onclick="exportHistoryCSV()" class="btn-secondary">Export CSV</button>
                </div>
                
                <table id="history-table" class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>User</th>
                            <th>Action</th>
                            <th>Date</th>
                            <th>Old Data</th>
                            <th>New Data</th>
                            <th>Difference</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody"></tbody>
                </table>
            </div>
        </div>

        <div id="diff-modal" class="modal">
            <div class="modal-content diff-modal">
                <span class="close" onclick="closeModal('diff-modal')">&times;</span>
                <h3>Difference</h3>
                <div class="diff-container">
                    <div>
                        <strong>Old version</strong>
                        <pre id="diff-old"></pre>
                    </div>
                    <div>
                        <strong>New version</strong>
                        <pre id="diff-new"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
